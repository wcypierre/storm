<p-popover #overlay appendTo="body">
  <ng-template pTemplate>
      <p-progressSpinner *ngIf="processing"></p-progressSpinner>
      <div *ngIf="!processing" class="flex flex-column">
        <p-message *ngFor="let msg of errorMessages" [severity]="msg.severity" [text]="msg.detail"
                    [styleClass]="'mb-3'"></p-message>
        <button (click)="onRemove(false)" type="button" pButton pRipple class="p-button t-overlay-button t-button-alt"
                label="Remove" aria-label="Remove selected torrents"></button>
        <button (click)="onRemove(true)" type="button" pButton pRipple class="p-button p-button-danger t-overlay-button"
                label="Remove With Data" aria-label="Remove selected torrents and associated data"></button>
      </div>


  </ng-template>
</p-popover>
