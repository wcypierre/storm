name: Publish Docker Image

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-frontend:
    name: Compile Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build:prod
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error

  discover:
    name: discover build contexts
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: find folders with Dockerfiles
        id: set-matrix
        run: |
          DIRS=$(find . -name "Dockerfile" -not -path "*/node_modules/*" \
            | xargs -I{} dirname {} \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0) | ltrimstr("./"))')
          echo "matrix={\"folder\":$DIRS}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: build & push (${{ matrix.folder }})
    needs: [compile-frontend, discover]
    if: ${{ needs.discover.outputs.matrix != '' }}
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: derive image name
        id: image
        run: |
          if [ "${{ matrix.folder }}" = "." ]; then
            echo "name=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          else
            SUFFIX=$(echo "${{ matrix.folder }}" | tr '/' '-')
            echo "name=ghcr.io/${{ github.repository }}-${SUFFIX}" >> "$GITHUB_OUTPUT"
          fi
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=main
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.folder }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
